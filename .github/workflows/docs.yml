name: Build & Deploy Docs

on:
  schedule:
    # Sundays at 18:00 UTC (= Mondays 03:00 KST). Weekly rebuild against
    # CUBRID develop.
    - cron: "0 18 * * 0"
  workflow_dispatch:
    inputs:
      cubrid_ref:
        description: "CUBRID branch / tag / commit to document"
        required: false
        default: "develop"
  push:
    branches:
      - main
    paths:
      - "Doxyfile"
      - "mkdocs.yml"
      - "requirements.txt"
      - "generate_doc.sh"
      - "docs/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cubrid-doxygen
        uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build documentation
        env:
          CUBRID_REF: ${{ github.event.inputs.cubrid_ref || 'develop' }}
        run: ./generate_doc.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
