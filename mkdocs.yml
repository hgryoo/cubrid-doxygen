site_name: CUBRID Engine API Reference
site_description: Source-level API documentation for the CUBRID database engine (develop branch)
site_url: https://cubrid.github.io/cubrid-doxygen/
repo_url: https://github.com/CUBRID/cubrid
repo_name: CUBRID/cubrid
edit_uri: ""

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdoxy:
      projects:
        cubrid:
          src-dirs: cubrid/src
          full-doc: True
          debug: False
          doxy-cfg-file: Doxyfile
      save-api: .mkdoxy
      full-doc: True
      debug: False

nav:
  - Home: index.md
  - API Reference:
      - Overview: cubrid/index.md
      - Namespaces: cubrid/namespaces.md
      - Classes: cubrid/classes.md
      - Files: cubrid/files.md
      - Modules: cubrid/modules.md
      - Pages: cubrid/pages.md
      - Examples: cubrid/examples.md
  - Build Info:
      - Doxygen Warnings: build/warnings.md
